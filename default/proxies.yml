api.anthropic.com:
  timeout: 120000
  paths:
    allowlist:
      - /v1/messages
  headers:
    inject:
      x-api-key: kv.anthropicApiKey
      anthropic-version: "'2023-06-01'"
    allowlist:
      - content-type
      - accept

# AWS Bedrock — common regions
# Authorization is SigV4-signed per-request in the browser, written to KV key
# `bedrockAuth` immediately before each fetch, and injected here by the proxy.
bedrock-runtime.us-east-1.amazonaws.com:
  timeout: 120000
  headers:
    inject:
      Authorization: kv.bedrockAuth

bedrock-runtime.us-west-2.amazonaws.com:
  timeout: 120000
  headers:
    inject:
      Authorization: kv.bedrockAuth

bedrock-runtime.eu-west-1.amazonaws.com:
  timeout: 120000
  headers:
    inject:
      Authorization: kv.bedrockAuth

bedrock-runtime.eu-central-1.amazonaws.com:
  timeout: 120000
  headers:
    inject:
      Authorization: kv.bedrockAuth

bedrock-runtime.ap-northeast-1.amazonaws.com:
  timeout: 120000
  headers:
    inject:
      Authorization: kv.bedrockAuth

bedrock-runtime.ap-southeast-1.amazonaws.com:
  timeout: 120000
  headers:
    inject:
      Authorization: kv.bedrockAuth

bedrock-runtime.ap-southeast-2.amazonaws.com:
  timeout: 120000
  headers:
    inject:
      Authorization: kv.bedrockAuth
